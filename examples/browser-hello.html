<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>zym-js — browser hello</title>
<style>
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 50rem; }
    textarea { width: 100%; height: 12rem; font-family: ui-monospace, monospace; }
    pre { background: #111; color: #eee; padding: 1rem; white-space: pre-wrap; }
    button { padding: 0.5rem 1rem; margin-top: 0.5rem; }
</style>
</head>
<body>
<h1>zym-js</h1>
<p>Tiny browser demo: compiles and runs a Zym script in-page via a wasm VM,
   with a JS-defined <code>print</code> wired to the output area.</p>

<textarea id="src">// Try editing me, then hit "Run".
func fib(n) {
    if (n < 2) return n;
    return fib(n - 1) + fib(n - 2);
}
print("fib(10) = %n", fib(10));
print("from JS: %s", greeting);
</textarea>
<button id="run">Run</button>
<pre id="out">loading wasm...</pre>

<script type="module">
    import Zym from "../js/zym.mjs";

    const out = document.getElementById("out");
    const src = document.getElementById("src");

    // Warm up the shared wasm module so the first "Run" click is snappy.
    out.textContent = `loaded ${await Zym.version()}\nready.`;

    document.getElementById("run").addEventListener("click", async () => {
        out.textContent = "";
        const vm = await Zym.newVM();
        // Wire print (the bridge deliberately ships no default).
        vm.registerNative("print(...)", (...args) => {
            // Minimal print: space-separated values. ZymValue.toJS() now
            // produces a natural JS representation for every kind (lists →
            // Array, maps/structs → plain Object, enums → frozen
            // {__enum,name,ordinal}, primitives as-is), so we can stringify
            // uniformly without reaching into VM-formatted fallbacks.
            const line = args.map(a => {
                const v = a.toJS();
                if (v === null) return "null";
                if (typeof v === "object") return JSON.stringify(v);
                return String(v);
            }).join(" ");
            out.textContent += line + "\n";
            return null;
        });
        vm.defineGlobal("greeting", "hello from JavaScript!");
        try {
            vm.run(src.value, { file: "<browser>" });
        } catch (e) {
            out.textContent += "ERROR: " + e.message;
        } finally {
            vm.free();
        }
    });
</script>
</body>
</html>
